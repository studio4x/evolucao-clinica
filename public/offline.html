<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - HomeCare Match</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            padding: 40px;
            background: white;
            border-radius: 24px;
            shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 16px;
            font-weight: 700;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #64748b;
            margin-bottom: 32px;
        }
        .button {
            display: inline-block;
            background-color: #0f172a;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Você está offline</h1>
        <p>Parece que você está sem conexão com a internet no momento. Algumas funcionalidades podem estar limitadas.</p>
        <a href="/" class="button">Tentar novamente</a>
    </div>
</body>
</html>
