<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    

    <title>Evolução Clínica</title>
    <meta name="description" content="Gerenciamento de Evoluções Clínicas com IA e Google Docs - Conexão Seres" />
    <meta name="theme-color" content="#005C13" />

    <!-- iOS Support / Native App Feel -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Evolução Clínica" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/api/favicon" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-touch-fullscreen" content="yes" />

    <!-- Android Support -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/api/favicon" />
    
    <!-- Open Graph / SEO -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Evolução Clínica" />
    <meta property="og:description" content="Gerenciamento de Evoluções Clínicas com IA e Google Docs - Conexão Seres" />
    <meta property="og:image" content="/icon-512x512.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Evolução Clínica" />
    <meta name="twitter:description" content="Gerenciamento de Evoluções Clínicas com IA e Google Docs - Conexão Seres" />
    <meta name="twitter:image" content="/icon-512x512.png" />
    <script>
      (function () {
        const storageKey = 'evolucao-clinica:site-config';

        const applyColors = function (colors) {
          if (!colors) return;
          const rootStyle = document.documentElement.style;
          rootStyle.setProperty('--color-brand-primary', colors.primary);
          rootStyle.setProperty('--color-brand-primary-hover', colors.primary_hover);
          rootStyle.setProperty('--color-brand-secondary', colors.secondary);
          rootStyle.setProperty('--color-brand-secondary-hover', colors.secondary_hover);
          rootStyle.setProperty('--color-brand-accent', colors.accent);
          rootStyle.setProperty('--color-brand-accent-hover', colors.accent_hover);
          rootStyle.setProperty('--color-brand-bg', colors.bg);
          rootStyle.setProperty('--color-brand-surface', colors.surface);
          rootStyle.setProperty('--color-brand-text', colors.text);
          rootStyle.setProperty('--color-brand-text-muted', colors.text_muted);
          rootStyle.setProperty('--color-brand-border', colors.border);
        };

        const updateThemeMeta = function (themeColor) {
          if (!themeColor) return;
          let meta = document.querySelector("meta[name='theme-color']");
          if (!meta) {
            meta = document.createElement('meta');
            meta.setAttribute('name', 'theme-color');
            document.head.appendChild(meta);
          }
          meta.setAttribute('content', themeColor);
        };

        const hydrate = function (config) {
          if (!config || !config.colors) return false;
          window.__INITIAL_SITE_CONFIG__ = config;
          applyColors(config.colors);
          updateThemeMeta(config.pwa_theme_color);
          try {
            localStorage.setItem(storageKey, JSON.stringify(config));
          } catch (error) {
            // Ignora falhas de storage e segue com a configuração já aplicada.
          }
          return true;
        };

        try {
          const xhr = new XMLHttpRequest();
          xhr.open('GET', '/api/brand-bootstrap', false);
          xhr.send(null);

          if (xhr.status >= 200 && xhr.status < 300 && xhr.responseText) {
            hydrate(JSON.parse(xhr.responseText));
            return;
          }
        } catch (error) {
          // Falha silenciosa: abaixo tentamos reaproveitar a última configuração salva.
        }

        try {
          const stored = localStorage.getItem(storageKey);
          if (stored) {
            hydrate(JSON.parse(stored));
          }
        } catch (error) {
          // Sem bootstrap disponível, o app segue com o tema padrão compilado.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This error occurs when a script (like Google APIs) tries to overwrite fetch
      // in an environment where fetch is defined as a read-only getter (like some iframes).
      (function() {
        try {
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          // If it's a getter-only property and is configurable, we add a setter to prevent the TypeError
          if (descriptor && descriptor.get && !descriptor.set && descriptor.configurable !== false) {
            const originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn('Intercepted attempt to overwrite window.fetch. Original fetch preserved.');
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // If we can't redefine it, we just hope for the best
        }
      })();
    </script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
